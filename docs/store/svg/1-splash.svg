<svg width="1080" height="2160" viewBox="0 0 1080 2160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E1016"/><stop offset="1" stop-color="#191C24"/>
    </linearGradient>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5B60E6"/><stop offset="0.55" stop-color="#9B2F87"/><stop offset="1" stop-color="#00A9C7"/>
    </linearGradient>
    <radialGradient id="g1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5B60E6" stop-opacity="0.5"/><stop offset="1" stop-color="#5B60E6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00A9C7" stop-opacity="0.4"/><stop offset="1" stop-color="#00A9C7" stop-opacity="0"/>
    </radialGradient>
    <style>text{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;}</style>
  </defs>
  <rect width="1080" height="2160" fill="url(#bg)"/>
  <circle cx="250" cy="250" r="420" fill="url(#g1)"/>
  <circle cx="880" cy="1900" r="420" fill="url(#g2)"/>

  <text x="540" y="150" font-size="60" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="-1">A native VirusTotal client</text>
  <text x="540" y="212" font-size="34" font-weight="500" fill="#AEB0CC" text-anchor="middle">Open source, fast, and beautiful</text>

  <!-- phone -->
  <g>
    <rect x="160" y="300" width="760" height="1720" rx="76" fill="#16181F" stroke="#2A2D36" stroke-width="2"/>
    <rect x="182" y="322" width="716" height="1676" rx="56" fill="#101218"/>
    <clipPath id="scr1"><rect x="182" y="322" width="716" height="1676" rx="56"/></clipPath>
    <g clip-path="url(#scr1)">
      <!-- radar rings + aurora cookie logo -->
      <g transform="translate(540,980)">
        <circle r="300" fill="none" stroke="#5B60E6" stroke-opacity="0.10" stroke-width="4"/>
        <circle r="230" fill="none" stroke="#5B60E6" stroke-opacity="0.16" stroke-width="4"/>
        <circle r="165" fill="none" stroke="#5B60E6" stroke-opacity="0.22" stroke-width="4"/>
        <rect x="-120" y="-120" width="240" height="240" rx="92" fill="url(#aurora)"/>
        <path d="M0 -78 L60 -54 V0 C60 48 34 82 0 96 C-34 82 -60 48 -60 0 V-54 Z" fill="#FFFFFF" fill-opacity="0.96"/>
        <path d="M-22 4 l16 18 34 -42" fill="none" stroke="#5B60E6" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="540" y="1430" font-size="108" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="-1">Veto</text>
      <text x="540" y="1508" font-size="36" fill="#AEB0CC" text-anchor="middle">The native, open source</text>
      <text x="540" y="1556" font-size="36" fill="#AEB0CC" text-anchor="middle">VirusTotal client.</text>
