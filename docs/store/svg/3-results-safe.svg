<svg width="1080" height="2160" viewBox="0 0 1080 2160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E1016"/><stop offset="1" stop-color="#191C24"/>
    </linearGradient>
    <radialGradient id="g1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#0C5128" stop-opacity="0.7"/><stop offset="1" stop-color="#0C5128" stop-opacity="0"/>
    </radialGradient>
    <style>text{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;}</style>
  </defs>
  <rect width="1080" height="2160" fill="url(#bg)"/>
  <circle cx="280" cy="260" r="360" fill="url(#g1)"/>

  <text x="540" y="150" font-size="60" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="-1">Clear verdicts at a glance</text>
  <text x="540" y="212" font-size="34" font-weight="500" fill="#AEB0CC" text-anchor="middle">A Quick summary, or the full picture</text>

  <rect x="160" y="300" width="760" height="1720" rx="76" fill="#16181F" stroke="#2A2D36" stroke-width="2"/>
  <rect x="182" y="322" width="716" height="1676" rx="56" fill="#101218"/>
  <clipPath id="scr"><rect x="182" y="322" width="716" height="1676" rx="56"/></clipPath>
  <g clip-path="url(#scr)">
    <!-- top bar -->
    <path d="M250 400 l-20 20 20 20 M230 420 h40" fill="none" stroke="#E4E1E9" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="540" y="434" font-size="34" font-weight="700" fill="#E4E1E9" text-anchor="middle">Analysis report</text>
    <path d="M812 404 v32 l-14 -10 -14 10 v-32 z" fill="none" stroke="#9A9CA8" stroke-width="4" stroke-linejoin="round"/>

    <!-- Quick | Detailed toggle -->
    <rect x="222" y="486" width="636" height="76" rx="38" fill="#1D1F26" stroke="#2A2D36" stroke-width="2"/>
    <rect x="228" y="492" width="312" height="64" rx="32" fill="#5B60E6"/>
    <text x="384" y="534" font-size="30" font-weight="700" fill="#FFFFFF" text-anchor="middle">Quick</text>
    <text x="700" y="534" font-size="30" font-weight="600" fill="#9A9CA8" text-anchor="middle">Detailed</text>

    <!-- verdict hero -->
    <rect x="222" y="590" width="636" height="620" rx="52" fill="#0C5128" fill-opacity="0.30"/>
    <g transform="translate(540,800)">
      <circle r="150" fill="none" stroke="#0C5128" stroke-width="34"/>
      <circle r="150" fill="none" stroke="#77DD9B" stroke-width="34" stroke-linecap="round"
              stroke-dasharray="942" stroke-dashoffset="0" transform="rotate(-90)"/>
      <path d="M-34 6 l24 26 46 -58" fill="none" stroke="#77DD9B" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="0" y="86" font-size="34" font-weight="800" fill="#93F8B5" text-anchor="middle">100%</text>
    </g>
    <text x="540" y="1046" font-size="48" font-weight="800" fill="#DFF5E6" text-anchor="middle">Clean</text>
    <text x="540" y="1094" font-size="28" fill="#A9C9B5" text-anchor="middle">No engine reported a threat.</text>
    <rect x="392" y="1128" width="296" height="56" rx="28" fill="#0C5128" fill-opacity="0.6"/>
    <text x="540" y="1164" font-size="26" font-weight="700" fill="#93F8B5" text-anchor="middle">72 engines analyzed</text>

    <!-- detection overview card -->
    <rect x="222" y="1244" width="636" height="470" rx="44" fill="#18191F"/>
    <rect x="250" y="1276" width="60" height="60" rx="16" fill="#5B60E6" fill-opacity="0.18"/>
    <path d="M266 1320 v-22 m18 22 v-34 m18 34 v-14" stroke="#C0C1FF" stroke-width="6" stroke-linecap="round"/>
    <text x="330" y="1300" font-size="32" font-weight="700" fill="#E4E1E9">Detection overview</text>
    <text x="330" y="1336" font-size="23" fill="#9A9CA8">72 engines weighed in</text>
    <circle cx="812" cy="1306" r="26" fill="#22242C"/>
    <text x="812" y="1316" font-size="30" font-weight="800" fill="#9A9CA8" text-anchor="middle">?</text>

    <g transform="translate(250,1380)">
      <text x="0" y="0" font-size="24" fill="#C7C5D0">Malicious</text>
      <rect x="0" y="16" width="560" height="16" rx="8" fill="#272930"/>
      <text x="0" y="72" font-size="24" fill="#C7C5D0">Harmless</text>
      <rect x="0" y="88" width="560" height="16" rx="8" fill="#272930"/>
      <rect x="0" y="88" width="470" height="16" rx="8" fill="#77DD9B"/>
      <text x="0" y="144" font-size="24" fill="#C7C5D0">Undetected</text>
      <rect x="0" y="160" width="560" height="16" rx="8" fill="#272930"/>
      <rect x="0" y="160" width="120" height="16" rx="8" fill="#84D2E5"/>
      <text x="0" y="216" font-size="24" fill="#C7C5D0">Unsupported</text>
      <rect x="0" y="232" width="560" height="16" rx="8" fill="#272930"/>
      <rect x="0" y="232" width="60" height="16" rx="8" fill="#918F9A"/>
    </g>
  </g>
</svg>
