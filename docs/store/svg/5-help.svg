<svg width="1080" height="2160" viewBox="0 0 1080 2160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E1016"/><stop offset="1" stop-color="#191C24"/>
    </linearGradient>
    <radialGradient id="g1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00A9C7" stop-opacity="0.4"/><stop offset="1" stop-color="#00A9C7" stop-opacity="0"/>
    </radialGradient>
    <style>text{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;}</style>
  </defs>
  <rect width="1080" height="2160" fill="url(#bg)"/>
  <circle cx="800" cy="300" r="400" fill="url(#g1)"/>

  <text x="540" y="150" font-size="60" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="-1">It explains the jargon</text>
  <text x="540" y="212" font-size="34" font-weight="500" fill="#AEB0CC" text-anchor="middle">A help note on every section</text>

  <rect x="160" y="300" width="760" height="1720" rx="76" fill="#16181F" stroke="#2A2D36" stroke-width="2"/>
  <rect x="182" y="322" width="716" height="1676" rx="56" fill="#101218"/>
  <clipPath id="scr"><rect x="182" y="322" width="716" height="1676" rx="56"/></clipPath>
  <g clip-path="url(#scr)">
    <text x="540" y="434" font-size="34" font-weight="700" fill="#E4E1E9" text-anchor="middle">Analysis report</text>

    <!-- hashes card -->
    <rect x="222" y="512" width="636" height="360" rx="44" fill="#18191F"/>
    <rect x="250" y="544" width="60" height="60" rx="16" fill="#5B60E6" fill-opacity="0.18"/>
    <circle cx="280" cy="574" r="15" fill="none" stroke="#C0C1FF" stroke-width="5"/>
    <text x="330" y="566" font-size="32" font-weight="700" fill="#E4E1E9">Hashes and signatures</text>
    <text x="330" y="602" font-size="22" fill="#9A9CA8">Tap any value to copy</text>
    <!-- highlighted help icon -->
    <circle cx="812" cy="574" r="30" fill="#00A9C7" fill-opacity="0.25" stroke="#84D2E5" stroke-width="3"/>
    <text x="812" y="585" font-size="34" font-weight="800" fill="#84D2E5" text-anchor="middle">?</text>

    <g font-family="monospace">
      <text x="250" y="672" font-size="24" fill="#9A9CA8">SHA-256</text>
      <text x="838" y="672" font-size="24" font-weight="700" fill="#E4E1E9" text-anchor="end">03aa...bda0c</text>
      <text x="250" y="734" font-size="24" fill="#9A9CA8">MD5</text>
      <text x="838" y="734" font-size="24" font-weight="700" fill="#E4E1E9" text-anchor="end">7b82...4355</text>
      <text x="250" y="796" font-size="24" fill="#9A9CA8">SSDEEP</text>
      <text x="838" y="796" font-size="24" font-weight="700" fill="#E4E1E9" text-anchor="end">384:Ph...q0</text>
    </g>

    <!-- popup explanation -->
    <g transform="translate(452,610)">
      <rect x="0" y="0" width="418" height="360" rx="28" fill="#22242C" stroke="#3A3D46" stroke-width="2"/>
      <path d="M382 -14 l16 20 -30 0 z" fill="#22242C"/>
      <text x="28" y="52" font-size="26" font-weight="700" fill="#FFFFFF">What is this?</text>
      <text x="28" y="100" font-size="23" fill="#C7C5D0">Cryptographic fingerprints of</text>
      <text x="28" y="132" font-size="23" fill="#C7C5D0">the file. Use them to look it up</text>
      <text x="28" y="164" font-size="23" fill="#C7C5D0">elsewhere or prove two files</text>
      <text x="28" y="196" font-size="23" fill="#C7C5D0">are identical.</text>
      <text x="28" y="246" font-size="22" fill="#84D2E5">SHA-256 is the strongest hash.</text>
      <text x="28" y="286" font-size="22" fill="#84D2E5">SSDEEP matches near-identical</text>
      <text x="28" y="318" font-size="22" fill="#84D2E5">files.</text>
    </g>

    <!-- history card below -->
    <rect x="222" y="912" width="636" height="300" rx="44" fill="#18191F"/>
    <rect x="250" y="944" width="60" height="60" rx="16" fill="#FFACE4" fill-opacity="0.16"/>
    <rect x="266" y="960" width="28" height="28" rx="6" fill="none" stroke="#FFACE4" stroke-width="5"/>
    <text x="330" y="984" font-size="32" font-weight="700" fill="#E4E1E9">History and community</text>
    <circle cx="812" cy="974" r="26" fill="#22242C"/>
    <text x="812" y="984" font-size="30" font-weight="800" fill="#9A9CA8" text-anchor="middle">?</text>
    <g>
      <text x="250" y="1064" font-size="24" fill="#9A9CA8">First seen</text>
      <text x="838" y="1064" font-size="24" font-weight="700" fill="#E4E1E9" text-anchor="end">3 years ago</text>
      <text x="250" y="1118" font-size="24" fill="#9A9CA8">Times submitted</text>
      <text x="838" y="1118" font-size="24" font-weight="700" fill="#E4E1E9" text-anchor="end">1,204x</text>
      <text x="250" y="1172" font-size="24" fill="#9A9CA8">Reputation</text>
      <text x="838" y="1172" font-size="24" font-weight="700" fill="#FFB2BB" text-anchor="end">-38</text>
    </g>
  </g>
</svg>
