<svg width="1024" height="500" viewBox="0 0 1024 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E1016"/>
      <stop offset="1" stop-color="#1A1D25"/>
    </linearGradient>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5B60E6"/>
      <stop offset="0.55" stop-color="#9B2F87"/>
      <stop offset="1" stop-color="#00A9C7"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5B60E6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#5B60E6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00A9C7" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#00A9C7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#9B2F87" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#9B2F87" stop-opacity="0"/>
    </radialGradient>
    <style>
      text { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1024" height="500" fill="url(#bg)"/>
  <circle cx="170" cy="120" r="320" fill="url(#glow1)"/>
  <circle cx="900" cy="440" r="300" fill="url(#glow2)"/>
  <circle cx="640" cy="60" r="240" fill="url(#glow3)"/>

  <!-- Brand lockup -->
  <g transform="translate(80,150)">
    <!-- squircle logo with shield -->
    <rect x="0" y="0" width="150" height="150" rx="52" fill="url(#aurora)"/>
    <path d="M75 30 L112 45 V78 C112 108 96 128 75 138 C54 128 38 108 38 78 V45 Z"
          fill="#FFFFFF" fill-opacity="0.95"/>
    <path d="M62 80 l10 11 21 -25" fill="none" stroke="#5B60E6" stroke-width="8"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(260,150)">
    <text x="0" y="55" font-size="76" font-weight="800" fill="#FFFFFF" letter-spacing="-1">Veto</text>
    <text x="2" y="110" font-size="30" font-weight="500" fill="#C9CBE8">The open source VirusTotal client</text>
    <!-- chips -->
    <g transform="translate(2,140)">
      <rect x="0" y="0" width="196" height="48" rx="24" fill="#5B60E6" fill-opacity="0.18" stroke="#5B60E6" stroke-opacity="0.5"/>
      <text x="26" y="31" font-size="22" font-weight="700" fill="#C0C1FF">Open source</text>
      <rect x="214" y="0" width="182" height="48" rx="24" fill="#00A9C7" fill-opacity="0.16" stroke="#00A9C7" stroke-opacity="0.5"/>
      <text x="238" y="31" font-size="22" font-weight="700" fill="#84D2E5">70+ engines</text>
    </g>
  </g>

  <!-- phone showing a clean verdict -->
  <g transform="translate(760,70)">
    <rect x="0" y="0" width="200" height="380" rx="34" fill="#16181F" stroke="#2A2D36" stroke-width="2"/>
    <rect x="12" y="14" width="176" height="352" rx="24" fill="#101218"/>
    <!-- gauge -->
    <circle cx="100" cy="110" r="58" fill="none" stroke="#272930" stroke-width="14"/>
    <circle cx="100" cy="110" r="58" fill="none" stroke="#77DD9B" stroke-width="14"
            stroke-linecap="round" stroke-dasharray="364" stroke-dashoffset="0"
            transform="rotate(-90 100 110)"/>
    <text x="100" y="104" font-size="30" font-weight="800" fill="#E4E1E9" text-anchor="middle">100%</text>
    <text x="100" y="128" font-size="15" fill="#9A9CA8" text-anchor="middle">clean</text>
    <text x="100" y="196" font-size="20" font-weight="800" fill="#E4E1E9" text-anchor="middle">No threats found</text>
    <!-- stat bars -->
    <g transform="translate(28,224)">
      <rect x="0" y="0" width="144" height="12" rx="6" fill="#272930"/>
      <rect x="0" y="0" width="132" height="12" rx="6" fill="#77DD9B"/>
      <rect x="0" y="28" width="144" height="12" rx="6" fill="#272930"/>
      <rect x="0" y="28" width="40" height="12" rx="6" fill="#84D2E5"/>
      <rect x="0" y="56" width="144" height="12" rx="6" fill="#272930"/>
      <rect x="0" y="56" width="18" height="12" rx="6" fill="#C0C1FF"/>
    </g>
  </g>
</svg>
